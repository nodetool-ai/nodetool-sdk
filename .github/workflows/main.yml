# For more information see:
# https://thegraybook.vvvv.org/reference/extending/publishing.html

name: push_nuget

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - '**/*.md'
      - '_agent_planning/**'

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Git Checkout
      uses: actions/checkout@master

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Setup NuGet
      uses: nuget/setup-nuget@v2

    - name: Regen + verify + build (C#)
      shell: pwsh
      run: |
        .\csharp\regen-and-verify.ps1

    - name: Build VL SDK
      run: dotnet build csharp/Nodetool.SDK.VL/Nodetool.SDK.VL.csproj -c Release

    - name: Pack VL.Nodetool
      run: nuget pack vvvv/deployment/VL.Nodetool.nuspec -OutputDirectory out

    - name: Push to NuGet
      run: nuget push out\VL.Nodetool.*.nupkg -Source https://api.nuget.org/v3/index.json -ApiKey ${{ secrets.NUGET_KEY }} -SkipDuplicate
